{{- if .Text }}
<figure>
  <img src="{{ .Destination | safeURL }}" alt="{{ .Text }}"{{ with .Title }} title="{{ . }}"{{ end }} loading="lazy">
  <figcaption>{{ .Text }}</figcaption>
</figure>
{{- else }}
<img src="{{ .Destination | safeURL }}" alt=""{{ with .Title }} title="{{ . }}"{{ end }} loading="lazy">
{{- end }}
