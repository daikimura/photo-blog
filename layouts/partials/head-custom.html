<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Noto Serif JP', serif;
    background-color: #1a1a1a;
    color: #e0e0e0;
  }
  h1, h2, h3, h4, h5, h6 {
    font-family: 'Noto Serif JP', serif;
    font-weight: 500;
  }
  hgroup h1 {
    font-size: 3rem;
    margin-bottom: 0.5rem;
  }
  .article-meta {
    font-size: 0.9rem;
    color: #999;
    margin-bottom: 1.5rem;
    text-align: center;
  }
  .article-meta time {
    margin-right: 1rem;
  }
  .article-meta .categories a {
    color: #aaa;
    text-decoration: none;
  }
  .article-meta .categories a:hover {
    text-decoration: underline;
  }
  .featured-image {
    max-width: 1400px;
    margin: 0 auto 2rem auto;
    padding: 0 3rem;
  }
  .featured-image img {
    width: 100%;
    height: auto;
    display: block;
    object-fit: cover;
  }
  .prose {
    color: #e0e0e0;
  }
  .prose a {
    color: #8ab4f8;
  }
  .prose figure {
    margin: 1.5rem 0;
  }
  .prose figure img {
    width: 100%;
    height: auto;
    display: block;
  }
  .prose figcaption {
    font-size: 0.9rem;
    color: #999;
    margin-top: 0.5rem;
    text-align: center;
  }

  /* トップページ 記事一覧 */
  .posts-grid {
    display: flex;
    flex-direction: column;
    gap: 2.5rem;
    padding: 1rem 3rem;
    max-width: 1400px;
    margin: 0 auto;
  }
  .post-card {
    background: #252525;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    transition: box-shadow 0.3s ease;
  }
  .post-card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  .post-thumbnail {
    display: block;
    overflow: hidden;
    cursor: pointer;
  }
  .post-thumbnail img {
    width: 100%;
    aspect-ratio: 2 / 1;
    object-fit: cover;
    pointer-events: none;
  }
  .post-content {
    padding: 1.25rem;
  }
  .post-content h2 {
    font-size: 1.25rem;
    margin: 0 0 0.75rem 0;
    line-height: 1.4;
  }
  .post-content h2 a {
    color: #e0e0e0;
    text-decoration: none;
  }
  .post-content h2 a:hover {
    color: #fff;
  }
  .post-meta {
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 0.75rem;
  }
  .post-meta time {
    margin-right: 1rem;
  }
  .post-meta .categories a {
    color: #999;
    text-decoration: none;
  }
  .post-excerpt {
    font-size: 0.95rem;
    color: #bbb;
    line-height: 1.6;
    margin-bottom: 1rem;
  }
  .read-more {
    display: inline-block;
    color: #ccc;
    font-size: 0.9rem;
    text-decoration: none;
    border-bottom: 1px solid #ccc;
  }
  .read-more:hover {
    color: #fff;
    border-color: #fff;
  }

  /* ページネーション */
  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0.5rem;
    margin: 2rem 0;
    padding: 1rem;
  }
  .pagination a, .pagination span {
    padding: 0.5rem 1rem;
    text-decoration: none;
    color: #ccc;
    border: 1px solid #444;
    border-radius: 4px;
  }
  .pagination a:hover {
    background: #333;
  }
  .pagination .current {
    background: #e0e0e0;
    color: #1a1a1a;
    border-color: #e0e0e0;
  }
</style>
<script>
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.post-thumbnail').forEach(function(el) {
    el.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      window.location.href = this.getAttribute('href');
    });
  });
});
</script>
